<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cluster Distribution & Performance</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 32px;
      width: 900px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h2 {
      margin: 0 0 24px 0;
      font-size: 20px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Cluster Distribution & Performance</h2>
    <canvas id="clusterChart"></canvas>
  </div>

  <script>
    const labels = ['HS1/EN1', 'HS2/EN2', 'HS3/EN3', 'HS4/EN4', 'HS5/EN5'];

    const data = {
      labels: labels,
      datasets: [
        {
          label: 'Suspect',
          data: [65, 85, 30, 60, 40],
          backgroundColor: '#D4BBEE'
        },
        {
          label: 'Inquiry',
          data: [45, 65, 25, 25, 18],
          backgroundColor: '#A97DD4'
        },
        {
          label: 'Applicant',
          data: [35, 42, 20, 18, 15],
          backgroundColor: '#7B4FBF'
        },
        {
          label: 'Admitted',
          data: [25, 28, 15, 10, 10],
          backgroundColor: '#4A2A8A'
        },
        {
          label: 'Enrolled',
          data: [15, 18, 10, 5, 8],
          backgroundColor: '#1E1245'
        }
      ]
    };

    const config = {
      type: 'bar',
      data: data,
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              usePointStyle: true,
              pointStyle: 'rect',
              padding: 20
            }
          },
          tooltip: {
            mode: 'point',
            intersect: true,
            callbacks: {
              title: function(context) {
                return context[0].label;
              },
              beforeBody: function(context) {
                const total = context[0].chart.data.datasets
                  .reduce(function(sum, ds) {
                    return sum + ds.data[context[0].dataIndex];
                  }, 0);
                const enrolled = context[0].chart.data.datasets[4].data[context[0].dataIndex];
                const conversion = Math.round((enrolled / total) * 100);
                return total + ' Students · ' + conversion + '% conversion';
              },
              label: function(context) {
                return ' ' + context.dataset.label + '   ' + context.raw;
              },
              afterBody: function(context) {
                return 'Learn more about ' + context[0].label + ' →';
              }
            },
            backgroundColor: '#ffffff',
            titleColor: '#111111',
            bodyColor: '#333333',
            borderColor: '#e0e0e0',
            borderWidth: 1,
            padding: 14,
            titleFont: { weight: 'bold', size: 14 },
            bodyFont: { size: 13 }
          }
        },
        scales: {
          x: {
            stacked: true,
            grid: { display: false }
          },
          y: {
            stacked: true,
            beginAtZero: true,
            title: {
              display: true,
              text: 'Number of Students'
            }
          }
        }
      }
    };

    new Chart(document.getElementById('clusterChart'), config);
  </script>
</body>
</html>
